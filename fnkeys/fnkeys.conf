# Zenbook Duo Fn-key helper configuration
# This file is intentionally separate from the core sysstates config.

# Display names used by kscreen-doctor or gdctl when the helper reacts to keyboard attach/detach.
DUO_MAIN_SCREEN="eDP-1"
DUO_LOWER_SCREEN="eDP-2"

# Default monitor scale for gdctl layouts. KDE/kscreen uses the saved Plasma scale.
DUO_MONITOR_SCALE=1.5

# KDE/kscreen position for the lower display when detached.
FNKEYS_LOWER_POSITION="0,1200"

# Scope toggles. Keep network and display-backlight sync off unless you really want this helper to own them.
FNKEYS_MANAGE_DISPLAY=true
FNKEYS_MANAGE_WIFI=false
FNKEYS_MANAGE_BLUETOOTH=false
FNKEYS_KEEP_BLUETOOTH_ON_WHEN_ATTACHED=true
FNKEYS_RESPECT_BLUETOOTH_FORCED_OFF=true
FNKEYS_SYNC_DISPLAY_BACKLIGHT=false
FNKEYS_REFRESH_PLASMA_ON_LAYOUT=false
FNKEYS_RESTART_PLASMA_ON_ATTACH=false
FNKEYS_MOVE_PLASMA_PANELS=true
FNKEYS_PLASMA_PANEL_SCREEN_ATTACHED=0
FNKEYS_PLASMA_PANEL_SCREEN_DETACHED=1

# Backlight sysfs paths used to mirror the main-panel brightness to the lower panel.
FNKEYS_MAIN_BACKLIGHT_PATH="/sys/class/backlight/intel_backlight/brightness"
FNKEYS_LOWER_BACKLIGHT_PATH="/sys/class/backlight/card1-eDP-2-backlight/brightness"

# Keyboard detection for the directly attached dock connector.
KEYBOARD_MATCH="Primax|ASUS.*Zenbook Duo.*Keyboard|Zenbook Duo.*Keyboard"
FNKEYS_KEYBOARD_USB_MATCH="Primax|ASUS.*Keyboard|ASUSTeK.*Keyboard|Zenbook Duo.*Keyboard|0b05:1b2[cd]"
FNKEYS_KEYBOARD_DOCK_USB_PATH="3-6"

# Bluetooth identity is watched for reconnect/Fn-key transport events, but does not count as attached.
FNKEYS_KEYBOARD_BT_MAC="E9:C7:F1:96:05:3C"
FNKEYS_KEYBOARD_BT_NAME="ASUS Zenbook Duo Keyboard"
FNKEYS_KEYBOARD_BT_ADAPTER="hci0"

# GATT characteristic used by the detachable keyboard backlight when it is connected over Bluetooth.
# Leave FNKEYS_KEYBOARD_BT_CHAR_PATH empty to build the BlueZ path from MAC, adapter, and suffix.
# BlueZ may require ExportClaimedServices = read-write under [GATT] in /etc/bluetooth/main.conf.
FNKEYS_KEYBOARD_BT_GATT_CHAR="service001b/char003b"
FNKEYS_KEYBOARD_BT_CHAR_PATH=""

# Keyboard backlight level for the detachable keyboard: 0 | 1 | 2 | 3
FNKEYS_BACKLIGHT_LEVEL=2
