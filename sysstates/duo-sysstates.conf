# Zenbook Duo system helper configuration
# Adjust the screen identifiers and rotation according to your setup.

LOWER_SCREEN="eDP-2"
MAIN_SCREEN="eDP-1"

# Rotation values: normal | left | right | inverted
MAIN_ROTATION="normal"
LOWER_ROTATION="normal"

# KDE/kscreen position for the lower display when detached.
LOWER_POSITION="0,1200"

# Keyboard detection regex for identifying the Zenbook Duo keyboard USB device.
KEYBOARD_MATCH="ASUS Zenbook Duo Keyboard"

# USB device match for the keyboard, plus the dock connector's sysfs path.
# Set KEYBOARD_DOCK_USB_PATH after checking /sys/bus/usb/devices while docked.
# Directly attached keyboard on this model appears as /sys/bus/usb/devices/3-6.
KEYBOARD_USB_MATCH="Primax|ASUS.*Keyboard|ASUSTeK.*Keyboard|Zenbook Duo.*Keyboard|0b05:1b2[cd]"
KEYBOARD_DOCK_USB_PATH="3-6"

# Bluetooth identity is intentionally not used as an attached-state signal.
KEYBOARD_BT_MAC="E9:C7:F1:96:05:3C"
KEYBOARD_BT_NAME="ASUS Zenbook Duo Keyboard"

# Default keyboard backlight level as a percentage (0-100).
BACKLIGHT_LEVEL_PERCENT=50

# Display attach/detach layout switching is opt-in.
MANAGE_DISPLAY_LAYOUT=true

# Optional Plasma/KWin refresh after display changes. Leave disabled unless needed;
# on some Plasma sessions this can temporarily remove the desktop shell.
REFRESH_PLASMA_ON_LAYOUT=false

# More forceful fallback for panels/taskbar that remain bound to the disabled lower screen.
RESTART_PLASMA_ON_ATTACH=false

# Move Plasma panels/taskbar to the visible display for each mode.
MOVE_PLASMA_PANELS=true
PLASMA_PANEL_SCREEN_ATTACHED=0
PLASMA_PANEL_SCREEN_DETACHED=1

# Delay after USB events before the watcher rechecks dock state.
WATCH_DEBOUNCE_SECONDS=1

# X11-only compatibility option. Leave disabled on KDE Plasma Wayland.
MOVE_WINDOWS_TO_MAIN=false
